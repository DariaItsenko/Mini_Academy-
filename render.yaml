# Render Blueprint — free tier (no persistent disk)
services:
  - type: web
    name: elementary-learning-hub
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix client && npm install --prefix server && npm run build --prefix client
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
